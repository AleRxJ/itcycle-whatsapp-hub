version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: whatsapp-hub-postgres
    environment:
      POSTGRES_DB: whatsapp_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatsapp-hub-network

  # RabbitMQ message broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: whatsapp-hub-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatsapp-hub-network

  # Redis (optional, for caching)
  redis:
    image: redis:7-alpine
    container_name: whatsapp-hub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatsapp-hub-network

  # n8n workflow automation (optional)
  n8n:
    image: n8nio/n8n:latest
    container_name: whatsapp-hub-n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - whatsapp-hub-network

  # Spring Boot application (uncomment when ready to run in Docker)
  # whatsapp-hub-app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: whatsapp-hub-app
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/whatsapp_hub
  #     SPRING_DATASOURCE_USERNAME: postgres
  #     SPRING_DATASOURCE_PASSWORD: postgres
  #     SPRING_RABBITMQ_HOST: rabbitmq
  #     SPRING_DATA_REDIS_HOST: redis
  #     N8N_WEBHOOK_URL: http://n8n:5678/webhook
  #     WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
  #     WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     rabbitmq:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - whatsapp-hub-network

networks:
  whatsapp-hub-network:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  n8n_data:
