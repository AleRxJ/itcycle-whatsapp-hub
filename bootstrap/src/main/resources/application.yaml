spring:
  application:
    name: itcycle-whatsapp-hub
  
  # Database configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/whatsapp_hub
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  # Flyway migrations
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  
  # RabbitMQ configuration
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  
  # Redis configuration (optional for caching)
  data:
    redis:
      host: localhost
      port: 6379
  
  # Security
  security:
    jwt:
      secret: ${JWT_SECRET:itcycle-whatsapp-hub-secret-key-change-in-production}
      expiration: 86400000  # 24 hours in milliseconds

# Server configuration
server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# Application info
info:
  app:
    name: iTCycle WhatsApp Hub
    description: B2B WhatsApp conversational automation platform
    version: 0.0.1-SNAPSHOT
    company: iTCycle

# Custom application properties
whatsapp:
  meta:
    api:
      url: https://graph.facebook.com/v18.0
    access:
      token: ${WHATSAPP_ACCESS_TOKEN:}
  webhook:
    verify:
      token: ${WHATSAPP_VERIFY_TOKEN:itcycle_whatsapp_hub_verify_token}

n8n:
  webhook:
    base:
      url: ${N8N_WEBHOOK_URL:http://localhost:5678/webhook}
    enabled: ${N8N_ENABLED:true}

events:
  rabbitmq:
    enabled: true
  n8n:
    trigger:
      enabled: true

rabbitmq:
  exchange:
    events: whatsapp.events
  queue:
    incoming:
      messages: whatsapp.incoming.messages
  routing:
    key:
      incoming:
        message: message.incoming

# Logging configuration
logging:
  level:
    root: INFO
    com.itcycle.whatsapp: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
